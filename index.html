<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球字体历史</title>
    <meta
      name="description"
      content="按文字体系与国家地区传统理解不同字体的历史来源、代表风格与使用场景。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Bodoni+Moda:opsz,ital,wght@6..96,0,400;6..96,0,500;6..96,0,700;6..96,1,400;6..96,1,500;6..96,1,700&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Katibeh&family=Manrope:wght@400;500;700;800&family=Mukta:wght@400;500;700&family=Noto+Kufi+Arabic:wght@400;500;700&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans+Devanagari:wght@400;500;700&family=Noto+Sans+Khmer:wght@400;500;700&family=Noto+Sans+Lao:wght@400;500;700&family=Noto+Sans+Myanmar:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=Noto+Serif+Devanagari:wght@400;500;700&family=Noto+Serif+Khmer:wght@400;500;700&family=Noto+Serif+Lao:wght@400;500;700&family=Noto+Serif+Myanmar:wght@400;500;700&family=Noto+Serif+Thai:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Rakkas&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=UnifrakturMaguntia&family=Vazirmatn:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main>
        <section class="timeline" id="timeline">
          <div class="section-head">
            <div>
              <p class="section-kicker">Timeline</p>
              <h2>全球字体历史</h2>
            </div>
            <p class="section-credit">Design by Joelqiu</p>
          </div>
          <div class="controls-dock">
            <div class="timeline-controls">
              <div class="controls-row controls-row-primary">
                <div class="controls-group controls-group-primary">
                  <div class="timeline-tabs-shell">
                    <div class="timeline-tabs-viewport" id="timelineTabsViewport">
                      <div class="timeline-tabs" id="timelineTabs"></div>
                    </div>
                  </div>
                </div>
                <label class="preview-input-panel" for="previewTextInput">
                  <div class="preview-input-wrap">
                    <span class="preview-input-prefix">Aa</span>
                    <input
                      id="previewTextInput"
                      class="preview-text-input"
                      type="text"
                      placeholder="输入文字后预览"
                      autocomplete="off"
                      spellcheck="false"
                    />
                  </div>
                </label>
              </div>
              <div class="country-board">
                <div class="country-tabs" id="countryTabs"></div>
              </div>
            </div>
          </div>

          <div class="era-grid" id="eras"></div>
        </section>
      </main>
    </div>

    <template id="eraCardTemplate">
      <article class="era-card">
        <div class="era-head">
          <div class="era-head-meta">
            <span class="era-period"></span>
            <span class="era-tag">
              <span class="era-tag-raw"></span>
              <span class="era-tag-zh"></span>
            </span>
          </div>
          <h3 class="era-title"></h3>
        </div>
        <dl class="era-info-grid">
          <div class="era-info-card">
            <dt>背景与用途</dt>
            <dd class="overview"></dd>
          </div>
          <div class="era-info-card">
            <dt>使用提醒</dt>
            <dd class="caution"></dd>
          </div>
          <div class="era-info-card era-info-card-faces">
            <dt>代表字体</dt>
            <div class="faces"></div>
          </div>
          <div class="era-info-card era-info-card-faces">
            <dt>结构特征</dt>
            <div class="era-structure-tags"></div>
          </div>
        </dl>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
